name: Test Hiya Framework

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: curl, json, mbstring, openssl, pdo, pdo_mysql, pdo_sqlite, session, tokenizer, xml, zip
    
    - name: Display PHP & OS info
      run: |
        php -v
        echo "OS: ${{ matrix.os }}"
        echo "PHP: ${{ matrix.php }}"
    
    - name: Check syntax errors
      run: |
        echo "Checking PHP syntax..."
        find . -name "*.php" -not -path "./.github/*" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || echo "All files passed!"
      shell: bash
    
    - name: Test autoloader
      run: |
        echo "Testing autoloader..."
        if [ -f "autoload.php" ]; then
          php -r "require_once 'autoload.php'; echo 'Autoloader loaded\n';"
        else
          echo "autoload.php not found"
        fi
      shell: bash
    
    - name: Test Hiya class
      run: |
        echo "Testing Hiya class..."
        php -r "
          require_once 'autoload.php';
          if (class_exists('Hiya')) {
            echo 'Hiya class found\n';
            echo 'Version: ' . (defined('HIYA_VERSION') ? HIYA_VERSION : 'unknown') . '\n';
          } else {
            echo 'Hiya class not found\n';
            exit(1);
          }
        "
      shell: bash
    
    - name: Test all PHP classes
      run: |
        echo "Testing all PHP classes in src/..."
        php << 'EOF'
        require_once 'autoload.php';
        
        // Function to find all PHP files
        function findPhpFiles($dir) {
          $files = [];
          $iterator = new RecursiveIteratorIterator(
            new RecursiveDirectoryIterator($dir, RecursiveDirectoryIterator::SKIP_DOTS)
          );
          foreach ($iterator as $file) {
            if ($file->getExtension() === 'php') {
              $files[] = $file->getPathname();
            }
          }
          return $files;
        }
        
        $srcPath = __DIR__ . '/src';
        $files = findPhpFiles($srcPath);
        
        $loaded = 0;
        $failed = 0;
        
        echo 'Found ' . count($files) . " PHP files\n";
        echo '------------------------' . "\n";
        
        foreach ($files as $file) {
          // Get class name from file path
          $relativePath = str_replace($srcPath . '/', '', $file);
          $className = 'Hiya\\' . str_replace(['/', '.php'], ['\\', ''], $relativePath);
          
          if (class_exists($className)) {
            echo '✅ ' . $className . "\n";
            $loaded++;
          } else {
            // Try with base name only
            $baseName = basename($file, '.php');
            if (class_exists($baseName)) {
              echo '✅ ' . $baseName . "\n";
              $loaded++;
            } else {
              echo '❌ ' . $className . "\n";
              $failed++;
            }
          }
        }
        
        echo '------------------------' . "\n";
        echo '✅ Loaded: ' . $loaded . "\n";
        echo '❌ Failed: ' . $failed . "\n";
        
        if ($failed > 0) exit(1);
        EOF
      shell: bash
    
    - name: Check required files
      run: |
        echo "Checking required files..."
        
        # Cek file wajib
        if [ -f "hiya.php" ] && [ -f "autoload.php" ] && [ -d "src" ] && [ -f "libs/yii/YiiBase.php" ]; then
          echo "  ✅ All required files found!"
          echo "  ✅ hiya.php exists"
          echo "  ✅ autoload.php exists"
          echo "  ✅ src/ directory exists"
          echo "  ✅ libs/yii/YiiBase.php exists"
        else
          echo "  ❌ Some required files missing!"
          [ -f "hiya.php" ] || echo "  ❌ hiya.php not found"
          [ -f "autoload.php" ] || echo "  ❌ autoload.php not found"
          [ -d "src" ] || echo "  ❌ src/ directory not found"
          [ -f "libs/yii/YiiBase.php" ] || echo "  ❌ libs/yii/YiiBase.php not found"
          exit 1
        fi
      shell: bash
    
    - name: Check directory structure
      run: |
        echo "📂 Directory Structure:"
        echo "======================"
        
        # Check src and all subdirectories
        if [ -d "src" ]; then
          echo "✅ src/ (root)"
          find src -type d -maxdepth 2 -not -path "*/\.*" | sort | while read -r dir; do
            if [ "$dir" != "src" ]; then
              count=$(find "$dir" -name "*.php" -maxdepth 1 2>/dev/null | wc -l)
              echo "   📁 ${dir#src/} ($count PHP files)"
            fi
          done
        else
          echo "❌ src/ not found"
        fi
        
        echo ""
        
        # Check libs and all subdirectories
        if [ -d "libs" ]; then
          echo "✅ libs/ (root)"
          find libs -type d -maxdepth 2 -not -path "*/\.*" | sort | while read -r dir; do
            if [ "$dir" != "libs" ]; then
              count=$(find "$dir" -name "*.php" -maxdepth 1 2>/dev/null | wc -l)
              echo "   📁 ${dir#libs/} ($count PHP files)"
            fi
          done
        else
          echo "❌ libs/ not found"
        fi
      shell: bash
    
    - name: Simple PHP execution test
      run: |
        echo "Running simple PHP test..."
        php -r "
          echo 'PHP version: ' . PHP_VERSION . '\n';
          echo 'Extensions loaded: ' . implode(', ', get_loaded_extensions()) . '\n';
          echo 'Memory limit: ' . ini_get('memory_limit') . '\n';
          echo 'PHP is working\n';
        "
      shell: bash

  # Optional: Test on different PHP configurations
  test-low-memory:
    name: Low Memory Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    continue-on-error: true
    
    strategy:
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2','8.3','8.4','8.5']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        ini-values: memory_limit=32M
    
    - name: Test with low memory
      run: |
        echo "Testing with memory_limit=32M..."
        php -r "require_once 'autoload.php'; echo 'Low memory test passed\n';"