name: Test Hiya Framework

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: curl, json, mbstring, openssl, pdo, pdo_mysql, pdo_sqlite, session, tokenizer, xml, zip
    
    - name: Display PHP & OS info
      run: |
        php -v
        echo "OS: ${{ matrix.os }}"
        echo "PHP: ${{ matrix.php }}"
    
    - name: Check syntax errors
      run: |
        echo "Checking PHP syntax..."
        find . -name "*.php" -not -path "./.github/*" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || echo "All files passed!"
      shell: bash
    
    - name: Test autoloader
      run: |
        echo "Testing autoloader..."
        if [ -f "autoload.php" ]; then
          php -r "require_once 'autoload.php'; echo 'Autoloader loaded\n';"
        else
          echo "autoload.php not found"
        fi
      shell: bash
    
    - name: Test Hiya class
      run: |
        echo "Testing Hiya class..."
        php -r "
          require_once 'autoload.php';
          if (class_exists('Hiya')) {
            echo 'Hiya class found\n';
            echo 'Version: ' . (defined('HIYA_VERSION') ? HIYA_VERSION : 'unknown') . '\n';
          } else {
            echo 'Hiya class not found\n';
            exit(1);
          }
        "
      shell: bash
    
    - name: Test components
      run: |
        echo "Testing components..."
        php -r "
          require_once 'autoload.php';
          \$classes = [
            'Hiya\\Helpers\\ArrayHelper',
            'Hiya\\Helpers\\StringHelper',
            'Hiya\\Helpers\\Collection'
          ];
          \$allOk = true;
          foreach (\$classes as \$class) {
            if (class_exists(\$class)) {
              echo '' . \$class . ' found\n';
            } else {
              echo ' ' . \$class . ' not found\n';
              \$allOk = false;
            }
          }
          if (!\$allOk) exit(1);
        "
      shell: bash
    
    - name: Check required files
      run: |
        echo "Checking required files..."
        files=("hiya.php" "autoload.php" "libs/yii/YiiBase.php")
        for file in "${files[@]}"; do
          if [ -f "$file" ]; then
            echo " $file found"
          else
            echo " $file not found"
          fi
        done
      shell: bash
    
    - name: Check directory structure
      run: |
        echo "Checking directory structure..."
        dirs=("src" "src/Base" "src/Helpers" "libs" "libs/yii")
        for dir in "${dirs[@]}"; do
          if [ -d "$dir" ]; then
            echo " $dir exists"
          else
            echo " $dir not found"
          fi
        done
      shell: bash
    
    - name: Simple PHP execution test
      run: |
        echo "Running simple PHP test..."
        php -r "
          echo 'PHP version: ' . PHP_VERSION . '\n';
          echo 'Extensions loaded: ' . implode(', ', get_loaded_extensions()) . '\n';
          echo 'Memory limit: ' . ini_get('memory_limit') . '\n';
          echo 'PHP is working\n';
        "
      shell: bash

  # Optional: Test on different PHP configurations
  test-low-memory:
    name: Low Memory Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    continue-on-error: true
    
    strategy:
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        ini-values: memory_limit=32M
    
    - name: Test with low memory
      run: |
        echo "Testing with memory_limit=32M..."
        php -r "require_once 'autoload.php'; echo 'Low memory test passed\n';"